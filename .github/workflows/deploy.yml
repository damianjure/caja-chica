name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Typecheck, architecture and tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Architecture guard
        run: npm run lint:arch

      - name: Tests
        run: npm test

  # ── Frontend ─────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Firebase Hosting
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Architecture guard (no client→server imports)
        run: npm run lint:arch

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/442790495206/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-deployer@caja-chica-bot.iam.gserviceaccount.com'

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project caja-chica-bot

  # ── Backend ──────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → Cloud Run
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/442790495206/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-deployer@caja-chica-bot.iam.gserviceaccount.com'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push Docker image
        run: |
          docker build -t gcr.io/caja-chica-bot/caja-chica .
          docker push gcr.io/caja-chica-bot/caja-chica

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy caja-chica \
            --image gcr.io/caja-chica-bot/caja-chica \
            --region us-west2 \
            --platform managed \
            --project caja-chica-bot \
            --quiet
