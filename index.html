<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caja Chica</title>
    <meta name="description" content="Caja Chica — registro de movimientos en lenguaje natural" />
    <meta name="application-name" content="Caja Chica" />
    <!-- PWA theme (strong-surface dark sage) -->
    <meta name="theme-color" content="#171f1b" />
    <!-- iOS installability -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Caja Chica" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!--
      Inter Variable self-hosted (rsms.me/inter). woff2 in /public/fonts/.
      Preloaded to avoid FOIT; @font-face declared in src/index.css.
      Self-host removes CDN dependency + improves LCP + privacy (no Google).
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/InterVariable.woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
